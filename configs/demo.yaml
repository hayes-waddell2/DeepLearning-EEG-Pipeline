# configs/demo.yaml
# Fast end-to-end smoke run on the synthetic sample data.

data:
  train_manifest: data/processed/train_manifest.csv
  train_data_dir: data/processed/train
  eval_manifest:  data/processed/eval_manifest.csv
  eval_data_dir:  data/processed/eval

loader:
  batch_size: 16
  val_frac: 0.2
  max_epochs_per_recording: 20
  num_workers: 2
  seed: 42

train:
  num_epochs: 2
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  use_amp: true
  device: auto
  output_dir: outputs/demo

eval:
  run_final_eval: true